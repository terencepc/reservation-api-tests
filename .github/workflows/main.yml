name: API Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reservation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reservation_test
      NODE_ENV: test

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v3

      - name: Checkout backend repository
        uses: actions/checkout@v3
        with:
          repository: dongtpc/reservation
          path: reservation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug after checkout
        run: |
          echo "Listing root:"
          ls -la
          echo "Listing backend folder:"
          ls -la reservation-backend || echo "Backend folder missing"

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: reservation/reservation-backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: reservation/reservation-backend
        run: npx prisma generate --schema=../prisma/schema.prisma
      
      - name: Run Prisma migrations
        working-directory: reservation/reservation-backend
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma

      - name: Start backend
        working-directory: reservation/reservation-backend
        run: |
          npm start > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            nc -z localhost 3000 && echo "Backend is up!" && exit 0
            echo "Waiting for backend..."
            sleep 3
          done
      
          echo "Backend failed to start"
          echo "==== BACKEND LOGS ===="
          cat reservation/reservation-backend/backend.log
          exit 1

      - name: Show backend logs
        run: cat reservation-backend/backend.log

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Karate tests
        run: mvn test
