name: API Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reservation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reservation_test
      NODE_ENV: test
      JWT_SECRET: mysupersecretkey
      BASE_URL: http://localhost:3000

    steps:

      - name: Checkout test repository
        uses: actions/checkout@v3

      - name: Checkout backend repository
        uses: actions/checkout@v3
        with:
          repository: dongtpc/reservation
          path: reservation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug after checkout
        run: |
          echo "Listing root:"
          ls -la
          echo "Listing backend folder:"
          ls -la reservation-backend || echo "Backend folder missing"
          echo "Listing reservation folder:"
          ls -la reservation || echo "Reservation folder missing"

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: reservation/reservation-backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: reservation/reservation-backend
        run: npx prisma generate 
      
      - name: Run Prisma migrations
        working-directory: reservation/reservation-backend
        run: npx prisma migrate deploy 
      
      - name: Run Prisma Seed
        working-directory: reservation/reservation-backend
        run: npx prisma db seed

      - name: Start backend
        working-directory: reservation/reservation-backend
        run: |
          npm start > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            nc -z localhost 3000 && echo "Backend is up!" && exit 0
            echo "Waiting for backend..."
            sleep 3
          done
      
          echo "Backend failed to start"
          echo "==== BACKEND LOGS ===="
          cat reservation/reservation-backend/backend.log
          exit 1
          
      - name: Show backend logs
        if: failure()
        run: cat reservation/reservation-backend/backend.log
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Check admin table
        run: |
          psql $DATABASE_URL -c 'SELECT * FROM "Admin";'

      - name: Run Karate tests
        run: mvn test

      # -----------------------------
      # K6 PERFORMANCE TEST SECTION
      # -----------------------------

      - name: Install k6
        run: |
          sudo gpg -k
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install k6 test dependencies
        run: npm install

      - name: Build k6 TypeScript tests
        run: npx tsc

      - name: Run k6 performance tests
        run: k6 run dist/tests/login.test.js
